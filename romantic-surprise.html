<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Romantic Surprise</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg1: #080714;
        --bg2: #1a0f28;
        --heart: #ff2f6d;
        --heart2: #ff6a9a;
        --accent: #ffd6e0;
        --text: #fff;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
      }
      body {
        margin: 0;
        display: grid;
        place-items: center;
        background:
          radial-gradient(
            1500px 900px at 50% 30%,
            rgba(255, 47, 109, 0.25),
            transparent 70%
          ),
          linear-gradient(135deg, var(--bg1), var(--bg2));
        font-family: Poppins, Arial, sans-serif;
        color: var(--text);
        overflow: hidden;
        padding-bottom: 60px;
      }
      .card {
        width: min(600px, 50vw);
        padding: 50px 30px 0px;
        border-radius: 32px;
        backdrop-filter: blur(14px);
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow:
          0 12px 60px rgba(0, 0, 0, 0.55),
          0 0 0 1px rgba(255, 255, 255, 0.05) inset;
        text-align: center;
        position: relative;
        overflow: hidden;
      }
      .card::before {
        content: "";
        position: absolute;
        inset: -140px;
        z-index: 0;
        background:
          radial-gradient(
            circle at 20% 30%,
            rgba(255, 47, 109, 0.35),
            transparent 70%
          ),
          radial-gradient(
            circle at 80% 70%,
            rgba(255, 106, 154, 0.35),
            transparent 70%
          );
        animation: bgflow 16s ease-in-out infinite alternate;
      }
      @keyframes bgflow {
        0% {
          transform: translateY(0);
        }
        100% {
          transform: translateY(-50px);
        }
      }
      .title {
        font-family: "Great Vibes", cursive;
        font-size: clamp(32px, 5.2vw, 46px);
        font-weight: 400;
        letter-spacing: 0.4px;
        position: relative;
        z-index: 1;
        color: var(--accent);
      }
      .stage {
        margin: 40px auto 0;
        position: relative;
        width: 460px;
        height: 350px;
        z-index: 1;
      }
      .halo {
        position: absolute;
        inset: auto 0 28px 0;
        margin: auto;
        width: 400px;
        height: 400px;
        border-radius: 50%;
        filter: blur(50px);
        background: radial-gradient(
          circle at 50% 50%,
          rgba(255, 59, 123, 0.75),
          rgba(255, 59, 123, 0.25) 40%,
          transparent 70%
        );
        opacity: 0.9;
        transition: opacity 0.4s ease;
      }
      .heartWrap {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        cursor: pointer;
        bottom: 00px;
      }
      svg {
        width: 320px;
        height: auto;
        overflow: visible;
      }
      .left,
      .right {
        transform-origin: 210px 160px;
        transition:
          transform 0.9s cubic-bezier(0.2, 0.8, 0.2, 1),
          filter 0.4s ease;
      }
      .left {
        filter: drop-shadow(0 16px 26px rgba(255, 47, 109, 0.55));
      }
      .right {
        filter: drop-shadow(0 16px 26px rgba(255, 106, 154, 0.55));
      }
      .heartGrad stop:first-child {
        stop-color: var(--heart);
      }
      .heartGrad stop:last-child {
        stop-color: var(--heart2);
      }
      .pulse {
        position: absolute;
        inset: 0;
        pointer-events: none;
      }
      .blob {
        position: absolute;
        left: 50%;
        top: 46%;
        width: 22px;
        height: 22px;
        border-radius: 50%;
        background: rgba(255, 59, 123, 0.7);
        filter: blur(16px);
        transform: translate(-50%, -50%) scale(1);
        animation: pulse 2.4s infinite;
      }
      @keyframes pulse {
        0% {
          transform: translate(-50%, -50%) scale(1);
          opacity: 0.85;
        }
        50% {
          transform: translate(-50%, -50%) scale(1.5);
          opacity: 0.4;
        }
        100% {
          transform: translate(-50%, -50%) scale(1);
          opacity: 0.85;
        }
      }
      .message {
        position: absolute;
        left: 50%;
        top: 30%;
        transform: translate(-50%, 50px);
        width: 100%;
        padding: 0 12px;
        font-size: clamp(24px, 4.6vw, 38px);
        font-weight: 600;
        font-family: "Great Vibes", cursive;
        letter-spacing: 0.8px;
        opacity: 0;
        color: var(--accent);
        text-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
        transition:
          opacity 1s ease 0.5s,
          transform 1s ease 0.5s;
      }
      .mini {
        display: none;
      }
      .heartWrap:hover .halo {
        opacity: 1;
      }
      .open .left {
        transform: translate(-72px, -16px) rotate(-20deg);
      }
      .open .right {
        transform: translate(72px, -16px) rotate(20deg);
      }
      .open .message {
        opacity: 1;
        transform: translate(-50%, -40px);
      }
      .floating {
        position: absolute;
        pointer-events: none;
        animation: rise 8s linear infinite;
      }
      @keyframes rise {
        0% {
          transform: translateY(0) scale(0.6);
          opacity: 1;
        }
        100% {
          transform: translateY(-600px) scale(1.3);
          opacity: 0;
        }
      }
      .sparkle {
        position: absolute;
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #fff;
        box-shadow: 0 0 10px #fff;
        opacity: 0.9;
        animation: spark 2s linear infinite;
      }
      @keyframes spark {
        0% {
          transform: scale(0) rotate(0deg);
          opacity: 0;
        }
        40% {
          transform: scale(1.2) rotate(180deg);
          opacity: 1;
        }
        100% {
          transform: scale(0) rotate(360deg);
          opacity: 0;
        }
      }
      .petal {
        position: absolute;
        width: 18px;
        height: 18px;
        background: pink;
        border-radius: 50% 50% 50% 0;
        transform: rotate(45deg);
        opacity: 0.8;
        animation: fall 10s linear infinite;
      }
      @keyframes fall {
        0% {
          transform: translateY(0) rotate(0deg);
          opacity: 1;
        }
        100% {
          transform: translateY(800px) rotate(360deg);
          opacity: 0;
        }
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="title">Click the heart</div>
      <div class="stage">
        <div class="halo"></div>
        <div class="heartWrap" id="heart">
          <div class="pulse"><div class="blob"></div></div>
          <svg viewBox="0 0 200 180" aria-hidden="true">
            <defs>
              <linearGradient
                id="g"
                class="heartGrad"
                x1="0"
                y1="0"
                x2="1"
                y2="1"
              >
                <stop offset="0%" />
                <stop offset="100%" />
              </linearGradient>
              <clipPath id="clipL">
                <rect x="0" y="0" width="100" height="180" />
              </clipPath>
              <clipPath id="clipR">
                <rect x="100" y="0" width="100" height="180" />
              </clipPath>
              <path
                id="heartPath"
                d="M100 35 C100 10 75 5 62 28 C50 5 15 10 15 38 C15 78 58 106 100 140 C142 106 185 78 185 38 C185 10 150 5 138 28 C125 5 100 10 100 35 Z"
              />
            </defs>
            <g class="left" clip-path="url(#clipL)">
              <use href="#heartPath" fill="url(#g)" />
            </g>
            <g class="right" clip-path="url(#clipR)">
              <use href="#heartPath" fill="url(#g)" />
            </g>
          </svg>
          <div class="message" id="msg">You are my sunshine love🌹</div>
        </div>
      </div>
    </div>
    <script>
      const heart = document.getElementById("heart");
      function activate() {
        heart.classList.toggle("open");
        if (heart.classList.contains("open")) {
          spawnHearts();
          spawnSparkles();
          spawnPetals();
        }
      }
      heart.addEventListener("click", activate);

      function spawnHearts() {
        for (let i = 0; i < 14; i++) {
          const h = document.createElement("div");
          h.className = "floating";
          h.innerHTML = "❤";
          h.style.left = Math.random() * 90 + 5 + "%";
          h.style.bottom = "0";
          h.style.fontSize = Math.random() * 28 + 28 + "px";
          h.style.color =
            "rgba(255,47,109," + (Math.random() * 0.6 + 0.4) + ")";
          h.style.animationDuration = Math.random() * 3 + 6 + "s";
          document.body.appendChild(h);
          setTimeout(() => h.remove(), 8000);
        }
      }

      function spawnSparkles() {
        for (let i = 0; i < 20; i++) {
          const s = document.createElement("div");
          s.className = "sparkle";
          s.style.left = Math.random() * 100 + "%";
          s.style.top = Math.random() * 100 + "%";
          s.style.animationDuration = Math.random() * 2 + 1 + "s";
          document.body.appendChild(s);
          setTimeout(() => s.remove(), 2500);
        }
      }

      function spawnPetals() {
        for (let i = 0; i < 12; i++) {
          const p = document.createElement("div");
          p.className = "petal";
          p.style.left = Math.random() * 100 + "%";
          p.style.top = "-40px";
          p.style.background = "hsl(" + Math.random() * 30 + 340 + ",80%,70%)";
          p.style.animationDuration = Math.random() * 5 + 6 + "s";
          document.body.appendChild(p);
          setTimeout(() => p.remove(), 11000);
        }
      }
    </script>
  </body>
</html>
