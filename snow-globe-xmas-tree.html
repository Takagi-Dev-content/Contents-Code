      body {
        background-color: #001;
        color: #fff;
        min-height: 100vh;
        display: grid;
        place-items: center;
        perspective: 1000px;
        overflow: hidden;
      }
      body * {
        transform-style: preserve-3d;
      }

      @-webkit-keyframes sceneRotate {
        to {
          rotate: y 1turn;
        }
      }
      @keyframes sceneRotate {
        to {
          rotate: y 1turn;
        }
      }
      .scene * {
        position: absolute;
      }

      .floor {
        inset: -100em;
        background-color: green;
        transform: rotateX(-90deg) translateZ(15em);
        background-image:
          radial-gradient(closest-side, transparent, #001),
          radial-gradient(closest-side, #000, transparent 15em),
          repeating-linear-gradient(#fff2 0, transparent, #fff2 2em),
          repeating-linear-gradient(90deg, #fff2 0, transparent, #fff2 2em);
      }

      .scene {
        position: relative;
        -webkit-animation: sceneRotate 120s infinite linear;
        animation: sceneRotate 120s infinite linear;
      }
      .snowglobe {
        cursor: pointer;
        -webkit-animation: var(--animation, snowglobe) 12s;
        animation: var(--animation, snowglobe) 12s;
      }
      .tree .trunk {
        inset: -7em -1em;
        transform: translateY(4em);
        background-color: brown;
        border-radius: 50%/90% 90% 3% 3%;
        animation: sceneRotate 120s infinite linear reverse;
      }

      @-webkit-keyframes snowglobe {
        0%,
        100% {
          pointer-events: none;
        }
      }
      @keyframes snowglobe {
        0%,
        100% {
          pointer-events: none;
        }
      }
      .snowglobe:active {
        --animation: none;
      }

      .text {
        top: -20em;

      }
      .text i {

        animation: var(--animation, text) 12s ease-in-out;
      }
      @-webkit-keyframes text {

      .base i::before,

        width: 100%;

        transform-origin: top;
        transform: rotateX(90deg);

      .base i::after {

      .glass {

        background-image: radial-gradient(

      .glass::after {
        content: "";
