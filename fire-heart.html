    <style>
      *,
      *::before,
      *::after {
        padding: 0;
        margin: 0 auto;
        box-sizing: border-box;
      }

      body {
        background-color: #000;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }

      .heart {
        position: relative;
      }
      .heart i {
        position: absolute;
        left: -30px;
        top: -30px;
        width: 200px;
        height: 200px;
        border-radius: 100px 100px 0 100px;
        transform-origin: 30px 30px;
        mix-blend-mode: plus-lighter;
        box-shadow:
          25px 25px 5px var(--color) inset,
          5px 5px 50px var(--color);
        -webkit-animation: i var(--duration) var(--delay) infinite linear;
        animation: i var(--duration) var(--delay) infinite linear;
      }
      @-webkit-keyframes i {
        to {
          rotate: 1turn;
        }
      }
      @keyframes i {
        to {
          rotate: 1turn;
        }
      }
      .heart i:nth-child(odd) {
        animation-direction: reverse;
      }
      .heart i:nth-child(1) {
        --color: hsl(0 100% 50% / 0.25);
        --delay: -7.17s;
        --duration: 6.072s;
