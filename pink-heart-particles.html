<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
      html, body {
        height: 100%;
        padding: 0;
        margin: 0;
        background: #000;
      }
      canvas {
        position: absolute;
        width: 100%;
        height: 100%;
      }
    </style>
  </head>
  <body>
    <canvas id="pinkboard"></canvas>

    <script>
      const settings = {
        particles: {
          length: 500, // maximum amount of particles
          duration: 2, // particle duration in sec
          velocity: 100, // particle velocity in pixels/sec
          effect: -0.75, // play with this for a nice effect
          size: 30, // particle size in pixels
        },
      };

      const raf = window.requestAnimationFrame || window.webkitRequestAnimationFrame || window.mozRequestAnimationFrame || ((callback) => window.setTimeout(() => callback(performance.now()), 16));

      class Point {
        constructor(x = 0, y = 0) {
          this.x = x;
          this.y = y;
        }

        clone() {
          return new Point(this.x, this.y);
        }

        length(length) {
          if (length === undefined) {
            return Math.hypot(this.x, this.y);
          }

          this.normalize();
          this.x *= length;
          this.y *= length;
          return this;
        }

        normalize() {
          const length = this.length();
          if (length !== 0) {
            this.x /= length;
            this.y /= length;
          }
          return this;
        }
      }

      class Particle {
        constructor() {
          this.position = new Point();
          this.velocity = new Point();
          this.acceleration = new Point();
          this.age = 0;
        }

        initialize(x, y, dx, dy) {
          this.position.x = x;
          this.position.y = y;
          this.velocity.x = dx;
          this.velocity.y = dy;
          this.acceleration.x = dx * settings.particles.effect;
          this.acceleration.y = dy * settings.particles.effect;
          this.age = 0;
        }

        update(deltaTime) {
          this.position.x += this.velocity.x * deltaTime;
          this.position.y += this.velocity.y * deltaTime;
          this.velocity.x += this.acceleration.x * deltaTime;
          this.velocity.y += this.acceleration.y * deltaTime;
          this.age += deltaTime;
        }

        draw(context, image) {
          const ease = (t) => (--t) * t * t + 1;
          const size = image.width * ease(this.age / settings.particles.duration);
          context.globalAlpha = 1 - this.age / settings.particles.duration;
          context.drawImage(image, this.position.x - size / 2, this.position.y - size / 2, size, size);
        }
      }

      class ParticlePool {
        constructor(length) {
          this.particles = Array.from({ length }, () => new Particle());
          this.firstActive = 0;
          this.firstFree = 0;
          this.duration = settings.particles.duration;
        }

        add(x, y, dx, dy) {
          this.particles[this.firstFree].initialize(x, y, dx, dy);
          this.firstFree += 1;
          if (this.firstFree === this.particles.length) this.firstFree = 0;
          if (this.firstActive === this.firstFree) this.firstActive += 1;
          if (this.firstActive === this.particles.length) this.firstActive = 0;
        }

        update(deltaTime) {
          const { particles, firstActive, firstFree, duration } = this;

          if (firstActive < firstFree) {
            for (let i = firstActive; i < firstFree; i += 1) {
              particles[i].update(deltaTime);
            }
          }

          if (firstFree < firstActive) {
            for (let i = firstActive; i < particles.length; i += 1) {
              particles[i].update(deltaTime);
            }
            for (let i = 0; i < firstFree; i += 1) {
              particles[i].update(deltaTime);
            }
          }

          while (particles[this.firstActive].age >= duration && this.firstActive !== this.firstFree) {
            this.firstActive += 1;
            if (this.firstActive === particles.length) this.firstActive = 0;
          }
        }

        draw(context, image) {
          const { particles, firstActive, firstFree } = this;

          if (firstActive < firstFree) {
            for (let i = firstActive; i < firstFree; i += 1) {
              particles[i].draw(context, image);
            }
          }

          if (firstFree < firstActive) {
            for (let i = firstActive; i < particles.length; i += 1) {
              particles[i].draw(context, image);
            }
            for (let i = 0; i < firstFree; i += 1) {
              particles[i].draw(context, image);
            }
          }
        }
      }

      (function (canvas) {
        const context = canvas.getContext('2d');
        const particles = new ParticlePool(settings.particles.length);
        const particleRate = settings.particles.length / settings.particles.duration;
        let time;

        const pointOnHeart = (t) => new Point(
          160 * Math.pow(Math.sin(t), 3),
          130 * Math.cos(t) - 50 * Math.cos(2 * t) - 20 * Math.cos(3 * t) - 10 * Math.cos(4 * t) + 25,
        );

        const image = (() => {
          const canvas = document.createElement('canvas');
          const context = canvas.getContext('2d');
          canvas.width = settings.particles.size;
          canvas.height = settings.particles.size;

          const to = (t) => {
            const point = pointOnHeart(t);
            point.x = settings.particles.size / 2 + point.x * settings.particles.size / 350;
            point.y = settings.particles.size / 2 - point.y * settings.particles.size / 350;
            return point;
          };

          context.beginPath();
          let t = -Math.PI;
          let point = to(t);
          context.moveTo(point.x, point.y);
          while (t < Math.PI) {
            t += 0.01;
            point = to(t);
            context.lineTo(point.x, point.y);
          }
          context.closePath();
          context.fillStyle = '#ea80b0';
          context.fill();

          const image = new Image();
          image.src = canvas.toDataURL();
          return image;
        })();

        const render = () => {
          raf(render);

          const newTime = performance.now() / 1000;
          const deltaTime = newTime - (time || newTime);
          time = newTime;

          context.clearRect(0, 0, canvas.width, canvas.height);

          const amount = particleRate * deltaTime;
          for (let i = 0; i < amount; i += 1) {
            const pos = pointOnHeart(Math.PI - 2 * Math.PI * Math.random());
            const dir = pos.clone().length(settings.particles.velocity);
            particles.add(canvas.width / 2 + pos.x, canvas.height / 2 - pos.y, dir.x, -dir.y);
          }

          particles.update(deltaTime);
          particles.draw(context, image);
        };

        const onResize = () => {
          canvas.width = canvas.clientWidth;
          canvas.height = canvas.clientHeight;
        };

        window.addEventListener('resize', onResize);

        setTimeout(() => {
          onResize();
          render();
        }, 10);
      })(document.getElementById('pinkboard'));
    </script>
  </body>
</html>
