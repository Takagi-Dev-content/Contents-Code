<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Love Heart Animation</title>
    <style>
      body {
        background-color: black;
      }
      canvas {
        position: absolute;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.2);
      }
      .txt {
        font-size: clamp(70px, 10vw, 150px);
        position: fixed;
        top: 40%;
        transform: translate(-50%, -50%);
        z-index: 1000;
        color: white;
      }

      .I-txt {
        left: 18.2%;
      }
      .U-txt {
        right: 3.5%;
      }

      .background-overlay{
        position: fixed;
        z-index: 1001;
        left: 0;
        right: 0;
        top: 0;
        bottom: 0;
        background-color: rgb(255, 255, 255);
        opacity: 1;
        transition: opacity 1s ease-out;
      }
      .main-content {
        opacity: 0;
        transition: opacity 2s ease-in;
      }
      .click-me-btn{
        padding: 20px 30px;
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        border: 1px solid black;
        border-radius: 5px;
        cursor: pointer;
        transition: 0.2s;
        font-size: 1.8rem;
      }
      .click-me-btn:hover{
        background-color: rgba(255, 0, 0, 0.27);
      }
      @media (width >= 1200px) {
        .txt {
          top: 37%;
        }
        .I-txt {
          left: 34.5%;
        }
        .U-txt {
          right: 26.9%;
        }
        canvas {
          scale: 1;
        }
      }
    </style>
  </head>
  <body>
    <div class="background-overlay">
        <button type="button" class="click-me-btn">Click Me</button>
    </div>

    <div class="main-content">
    <h1 class="txt I-txt">I</h1>
    <canvas id="heart"></canvas>
    <h1 class="txt U-txt">U</h1>
    </div>

    <script>
      var loop;
      window.requestAnimationFrame =
        window.__requestAnimationFrame ||
        window.requestAnimationFrame ||
        window.webkitRequestAnimationFrame ||
        window.mozRequestAnimationFrame ||
        window.oRequestAnimationFrame ||
        window.msRequestAnimationFrame ||
        (function () {
          return function (callback, element) {
            let lastTime = element.__lastTime;
            if (lastTime === undefined) {
              lastTime = 0;
            }
            const currTime = Date.now();
            const timeToCall = Math.max(1, 33 - (currTime - lastTime));
            window.setTimeout(callback, timeToCall);
            element.__lastTime = currTime + timeToCall;
          };
        })();
      window.isDevice =
        /android|webos|iphone|ipad|ipod|blackberry|iemobile|opera mini/i.test(
          (
            navigator.userAgent ||
            navigator.vendor ||
            window.opera
          ).toLowerCase(),
        );
      let loaded = false;
      const init = function () {
        if (loaded) return;

        loaded = true;
        const mobile = window.isDevice;
        const koef = mobile ? 0.9 : 1;
        const canvas = document.getElementById("heart");
        const ctx = canvas.getContext("2d");
        let width = (canvas.width = koef * innerWidth);
        let height = (canvas.height = koef * innerHeight);
        const rand = Math.random;
        ctx.fillStyle = "rgba(0,0,0,1)";
        ctx.fillRect(0, 0, width, height);

        const heartPosition = function (rad) {
          //return [Math.sin(rad), Math.cos(rad)];
          return [
            Math.pow(Math.sin(rad), 3),
            -(
              15 * Math.cos(rad) -
              5 * Math.cos(2 * rad) -
              2 * Math.cos(3 * rad) -
              Math.cos(4 * rad)
            ),
          ];
        };
        // scaleAndTranslate function: (pos, sx, sy, dx, dy)
        // sx, sy = scale factors (larger = bigger heart)
        // dx, dy = position offsets (positive dx = right, positive dy = down)
        const scaleAndTranslate = function (pos, sx, sy, dx, dy) {
          return [dx + pos[0] * sx, dy + pos[1] * sy];
        };

        let pointsOrigin = [];
        let heartPointsCount;
        const updateHeart = function () {
          const heartScale = Math.min(1, innerWidth / 1200);
          pointsOrigin = [];
          let i;
          const dr = mobile ? 0.1 : 0.1;
          for (i = 0; i < Math.PI * 2; i += dr)
            pointsOrigin.push(
              scaleAndTranslate(
                heartPosition(i),
                140 * heartScale,
                9 * heartScale,
                0,
                0,
              ),
            );
          for (i = 0; i < Math.PI * 2; i += dr)
            pointsOrigin.push(
              scaleAndTranslate(
                heartPosition(i),
                100 * heartScale,
                6 * heartScale,
                20 * heartScale,
                0,
              ),
            );
          for (i = 0; i < Math.PI * 2; i += dr)
            pointsOrigin.push(
              scaleAndTranslate(
                heartPosition(i),
                60 * heartScale,
                3 * heartScale,
                0,
                0,
              ),
            );
          heartPointsCount = pointsOrigin.length;
        };

        window.addEventListener("resize", function () {
          width = canvas.width = koef * innerWidth;
          height = canvas.height = koef * innerHeight;
          ctx.fillStyle = "rgba(0,0,0,1)";
          ctx.fillRect(0, 0, width, height);
          updateHeart();
        });

        updateHeart();
        const traceCount = mobile ? 50 : 50;

        const targetPoints = [];
        // pulse function: Centers the heart on screen
        // width / 2 and height / 2 = center of canvas (adjust these to move heart)
        const pulse = function (kx, ky) {
          for (let i = 0; i < pointsOrigin.length; i++) {
            targetPoints[i] = [];
            targetPoints[i][0] = kx * pointsOrigin[i][0] + width / 2; // Horizontal center
            targetPoints[i][1] = ky * pointsOrigin[i][1] + height / 2.2; // Vertical center (moved up)
          }
        };

        const e = [];
        let i;
        for (i = 0; i < heartPointsCount; i++) {
          const x = rand() * width;
          const y = rand() * height;
          e[i] = {
            vx: 0,
            vy: 0,
            R: 2,
            speed: rand() + 5,
            q: ~~(rand() * heartPointsCount),
            D: 2 * (i % 2) - 1,
            force: 0.2 * rand() + 0.7,
            f:
              "hsla(0," +
              ~~(40 * rand() + 60) +
              "%," +
              ~~(60 * rand() + 20) +
              "%,.3)",
            trace: [],
          };
          for (let k = 0; k < traceCount; k++) e[i].trace[k] = { x: x, y: y };
        }

        const config = {
          traceK: 0.4,
          timeDelta: 0.01,
        };

        let time = 0;
        loop = function () {
          const n = -Math.cos(time);
          pulse((1 + n) * 0.5, (1 + n) * 0.5);
          time +=
            (Math.sin(time) < 0 ? 9 : n > 0.8 ? 0.2 : 1) * config.timeDelta;
          ctx.fillStyle = "rgba(0,0,0,.1)";
          ctx.fillRect(0, 0, width, height);
          for (i = e.length; i--; ) {
            const u = e[i];
            const q = targetPoints[u.q];
            const dx = u.trace[0].x - q[0];
            const dy = u.trace[0].y - q[1];
            const length = Math.sqrt(dx * dx + dy * dy);
            if (10 > length) {
              if (0.95 < rand()) {
                u.q = ~~(rand() * heartPointsCount);
              } else {
                if (0.99 < rand()) {
                  u.D *= -1;
                }
                u.q += u.D;
                u.q %= heartPointsCount;
                if (0 > u.q) {
                  u.q += heartPointsCount;
                }
              }
            }
            u.vx += (-dx / length) * u.speed;
            u.vy += (-dy / length) * u.speed;
            u.trace[0].x += u.vx;
            u.trace[0].y += u.vy;
            u.vx *= u.force;
            u.vy *= u.force;
            for (let k = 0; k < u.trace.length - 1; ) {
              const T = u.trace[k];
              const N = u.trace[++k];
              N.x -= config.traceK * (N.x - T.x);
              N.y -= config.traceK * (N.y - T.y);
            }
            ctx.fillStyle = u.f;
            for (let k = 0; k < u.trace.length; k++) {
              ctx.fillRect(u.trace[k].x, u.trace[k].y, 1, 1);
            }
          }
          //ctx.fillStyle = "rgba(255,255,255,1)";
          //for (i = u.trace.length; i--;) ctx.fillRect(targetPoints[i][0], targetPoints[i][1], 2, 2);

          window.requestAnimationFrame(loop, canvas);
        };
      };

      var s = document.readyState;
      if (s === "complete" || s === "loaded" || s === "interactive") init();
      else document.addEventListener("DOMContentLoaded", init, false);

      document.querySelector('.click-me-btn').addEventListener('click', function() {
        const overlay = document.querySelector('.background-overlay');
        const main = document.querySelector('.main-content');
        overlay.style.opacity = '0';
        setTimeout(() => {
          overlay.style.display = 'none';
          main.style.opacity = '1';
          loop();
        }, 1000);
      });
    </script>
  </body>
</html>
