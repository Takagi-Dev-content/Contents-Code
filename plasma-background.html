<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dat-gui/0.5.1/dat.gui.min.js"></script>
    <style>
      body{
        overflow: hidden;
      }
      canvas {
        position: absolute;
        top: 0;
        left: 0;
      }
    </style>
  </head>
  <body>
    <canvas id="c"></canvas>

    <script>
      const canvas = document.getElementById("c");
      const ctx = canvas.getContext("2d");
      let w = (canvas.width = window.innerWidth);
      let h = (canvas.height = window.innerHeight);

      const opts = {
        rays: 30,
        maxRadius: Math.sqrt((w * w) / 4 + (h * h) / 4),
        circleRadiusIncrementAcceleration: 2,
        radiantSpan: 0.4,
        rayAngularVelSpan: 0.005,
        rayAngularVelLineWidthMultiplier: 60,
        rayAngularAccWaveInputBaseIncrementer: 0.03,
        rayAngularAccWaveInputAddedIncrementer: 0.02,
        rayAngularAccWaveMultiplier: 0.0003,
        baseWaveInputIncrementer: 0.01,
        addedWaveInputIncrementer: 0.01,
        circleNumWaveIncrementerMultiplier: 0.1,
        cx: w / 2,
        cy: h / 2,
        tickHueMultiplier: 1,
        shadowBlur: 0,
        repaintAlpha: 0.2,
        apply: init,
      };

      const rays = [];
      let tick = 0;
      let tickHueMultiplied;
      const gui = new dat.GUI();

      function init() {
        rays.length = 0;
        for (let i = 0; i < opts.rays; i += 1) {
          rays.push(new Ray());
        }

        if (tick === 0) {
          for (const [key, value] of Object.entries(opts)) {
            if (Number.isNaN(value)) {
              gui.add(opts, key);
            } else {
              gui.add(opts, key, 0, value * 3);
            }
          }
          gui.close();
          loop();
        }
      }

      function loop() {
        window.requestAnimationFrame(loop);
        tick += 1;

        ctx.globalCompositeOperation = "source-over";
        ctx.shadowBlur = 0;
        ctx.fillStyle = `rgba(0,0,0,${opts.repaintAlpha})`;
        ctx.fillRect(0, 0, w, h);
        ctx.shadowBlur = opts.shadowBlur;
        ctx.globalCompositeOperation = "lighter";

        tickHueMultiplied = opts.tickHueMultiplier * tick;
        rays.forEach((ray) => ray.step());
      }

      class Ray {
        constructor() {
          this.circles = [new Circle(0)];
          this.rot = Math.random() * Math.PI * 2;
          this.angularVel =
            Math.random() * opts.rayAngularVelSpan * (Math.random() < 0.5 ? 1 : -1);
          this.angularAccWaveInput = Math.random() * Math.PI * 2;
          this.angularAccWaveInputIncrementer =
            opts.rayAngularAccWaveInputBaseIncrementer +
            opts.rayAngularAccWaveInputAddedIncrementer * Math.random();

          let security = 100;
          let count = 0;

          while (--security > 0 && this.circles[count].radius < opts.maxRadius) {
            this.circles.push(new Circle(++count));
          }
        }

        step() {
          this.rot += this.angularVel +=
            Math.sin((this.angularAccWaveInput += this.angularAccWaveInputIncrementer)) *
            opts.rayAngularAccWaveMultiplier;

          let rot = this.rot;
          let x = opts.cx;
          let y = opts.cy;

          ctx.lineWidth =
            Math.min(
              0.00001 / Math.abs(this.angularVel),
              10 / opts.rayAngularVelLineWidthMultiplier,
            ) * opts.rayAngularVelLineWidthMultiplier;

          ctx.beginPath();
          ctx.moveTo(x, y);

          for (const circle of this.circles) {
            circle.step();
            rot += circle.radiant;

            const x2 = opts.cx + Math.sin(rot) * circle.radius;
            const y2 = opts.cy + Math.cos(rot) * circle.radius;
            const mx = (x + x2) / 2;
            const my = (y + y2) / 2;

            ctx.quadraticCurveTo(x, y, mx, my);
            x = x2;
            y = y2;
          }

          ctx.strokeStyle = ctx.shadowColor = `hsl(${(((rot + this.rot) / 2) % (Math.PI * 2)) / Math.PI * 30 + tickHueMultiplied},80%,50%)`;
          ctx.stroke();
        }
      }

      class Circle {
        constructor(n) {
          this.radius = opts.circleRadiusIncrementAcceleration * Math.pow(n, 2);
          this.waveInputIncrementer =
            (opts.baseWaveInputIncrementer + opts.addedWaveInputIncrementer * Math.random()) *
            (Math.random() < 0.5 ? 1 : -1) *
            opts.circleNumWaveIncrementerMultiplier *
            n;
          this.waveInput = Math.random() * Math.PI * 2;
          this.radiant = Math.random() * opts.radiantSpan * (Math.random() < 0.5 ? 1 : -1);
        }

        step() {
          this.waveInput += this.waveInputIncrementer;
          this.radiant = Math.sin(this.waveInput) * opts.radiantSpan;
        }
      }

      init();

      window.addEventListener("resize", () => {
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight;

        opts.maxRadius = Math.sqrt((w * w) / 4 + (h * h) / 4);
        opts.cx = w / 2;
        opts.cy = h / 2;

        init();
      });

      canvas.addEventListener("click", (event) => {
        opts.cx = event.clientX;
        opts.cy = event.clientY;
      });
    </script>
  </body>
</html>
