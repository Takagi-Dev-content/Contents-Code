<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.172.0/three.tsl.js"></script>
    <style>
      body {
        margin: 0;
        overflow: hidden;
      }

      canvas {
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <script type="importmap">
      {
        "imports": {
          "./three": "https://assets.codepen.io/25387/three.webgpu.min.js",
          "./three/webgl": "https://esm.sh/three@0.172.0/src/renderers/WebGLRenderer.js",
          "./three/tsl": "https://assets.codepen.io/25387/three.tsl.js",
          "./three/addons/": "https://esm.sh/three@0.172.0/examples/jsm/"
        }
      }
    </script>

    <script type="module">
      import * as THREE from "./three";
      import { WebGLRenderer } from "./three/webgl";
      import * as BufferGeometryUtils from "./three/addons/utils/BufferGeometryUtils.js";
      import { OrbitControls } from "./three/addons/controls/OrbitControls.js";

      const colors = [
        "hotpink",
        "orangered",
        "plum",
        "skyblue",
        "aqua",
        "palegreen",
        "greenyellow",
        "#feb",
        "yellowgreen",
        "sandybrown",
        "blue",
        "#83f",
        "lavender",
        "mediumslateblue",
        "darkorchid",
      ];

      const settings = {
        iterations: 14,
        rules: {
          X: "F[-FY][+FY]",
          Y: "F[&FX][^FX]",
        },
        axiom: "FFFX",
        lightColor: "sandybrown",
        branchBaseColor: "#050505",
        sceneBGColor: "#050505",
        flow: true,
        flowDirection: 1,
        flowSpeed: 1.2,
        pulseWidth: 1.3,
        pulseInterval: 3,
        minAngle: 15,
        maxAngle: 35,
        coneFactor: 0.9,
        initialLength: 0.8,
        minLengthFactor: 0.2,
        maxLengthFactor: 0.8,
        initialThickness: 0.75,
        thicknessFactor: 0.9,
      };

      const { degToRad, randFloat } = THREE.MathUtils;
      const { floor, random } = Math;
      const randomFrom = (arr, except) => {
        const pool = except ? arr.filter((e) => !except.includes(e)) : arr;
        return pool[floor(random() * pool.length)];
      };

      // Scene setup & renderer
      const scene = new THREE.Scene();
      scene.background = new THREE.Color(settings.sceneBGColor);

      const camera = new THREE.PerspectiveCamera(
        60,
        window.innerWidth / window.innerHeight,
        0.1,
        1000,
      );
      camera.position.set(0, 0, 16);

      const renderer = new WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      document.body.appendChild(renderer.domElement);

      const controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.target.set(0, 10, 0);
      controls.enabled = false;

      // L-System configuration & string generation
      for (let i = 0; i < settings.iterations; i++) {
        settings.axiom = settings.axiom
          .split("")
          .map((char) => settings.rules[char] || char)
          .join("");
      }

      // Custom shader material for flowing light effect
      const flowingLightMaterial = new THREE.ShaderMaterial({
        defines: {
          FLOW_UPSTREAM: settings.flowDirection === 1,
        },
        uniforms: {
          uTime: { value: 0 },
          uFlowSpeed: { value: settings.flowSpeed },
          uPulseWidth: { value: settings.pulseWidth },
          uPulseInterval: { value: settings.pulseInterval },
          uLightColor: { value: new THREE.Color(settings.lightColor) },
          uBaseColor: { value: new THREE.Color(settings.branchBaseColor) },
        },
        vertexShader: `
    attribute float aProgress;
    varying float vProgress;
    varying vec3 vNormal;
    void main() {
      vProgress = aProgress;
      vNormal = normalize(normalMatrix * normal);
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,
        fragmentShader: `
    uniform float uTime;
    uniform float uFlowSpeed;
    uniform float uPulseWidth;
    uniform float uPulseInterval;
    uniform vec3 uLightColor;
    uniform vec3 uBaseColor;
    varying float vProgress;
    varying vec3 vNormal;

    void main() {
      #ifdef FLOW_UPSTREAM
        float wave = mod(vProgress - uTime * uFlowSpeed, uPulseInterval);
        float pulse = smoothstep(uPulseInterval - uPulseWidth, uPulseInterval, wave);
      #else
        float wave = mod(vProgress + uTime * uFlowSpeed, uPulseInterval);
        float pulse = smoothstep(uPulseInterval - uPulseWidth, uPulseInterval, wave);
      #endif

      vec3 finalColor = mix(uBaseColor, uLightColor * 2.5, pulse);

      gl_FragColor = vec4(finalColor, 1.0);
    }
  `,
      });

      // Turtle geometry structuring
      function generateLSystemTree(string) {
        const geometries = [];
        const stateStack = [];

        let position = new THREE.Vector3(0, 0, 0);
        let direction = new THREE.Vector3(0, 1, 0);
        let currentProgress = 0.0;

        for (let i = 0; i < string.length; i++) {
          const char = string[i];

          if (char === "F") {
            const lengthFactor = Math.max(
              0.2,
              1.0 -
                currentProgress *
                  randFloat(settings.minLengthFactor, settings.maxLengthFactor),
            );
            const currentLength = settings.initialLength * lengthFactor;
            const nextPosition = position
              .clone()
              .addScaledVector(direction, currentLength);
            const distance = position.distanceTo(nextPosition);

            const radiusFactor = Math.max(
              0.1,
              1.0 - currentProgress * settings.thicknessFactor,
            );
            const currentRadius = settings.initialThickness * radiusFactor;

            const cylinderGeo = new THREE.CylinderGeometry(
              currentRadius * settings.coneFactor,
              currentRadius,
              distance,
              6,
            );

            cylinderGeo.translate(0, distance / 2, 0);
            cylinderGeo.rotateX(Math.PI / 2);

            const quaternion = new THREE.Quaternion().setFromUnitVectors(
              new THREE.Vector3(0, 0, 1),
              direction.clone().normalize(),
            );
            cylinderGeo.applyQuaternion(quaternion);
            cylinderGeo.translate(position.x, position.y, position.z);

            const vertexCount = cylinderGeo.attributes.position.count;
            const progressArray = new Float32Array(vertexCount).fill(
              currentProgress,
            );
            cylinderGeo.setAttribute(
              "aProgress",
              new THREE.BufferAttribute(progressArray, 1),
            );

            geometries.push(cylinderGeo);

            position.copy(nextPosition);
            currentProgress += 0.06;
          } else if (char === "+") {
            const randomAngle = degToRad(
              randFloat(settings.minAngle, settings.maxAngle),
            );
            direction.applyAxisAngle(new THREE.Vector3(0, 0, 1), randomAngle);
          } else if (char === "-") {
            const randomAngle = degToRad(
              randFloat(settings.minAngle, settings.maxAngle),
            );
            direction.applyAxisAngle(new THREE.Vector3(0, 0, 1), -randomAngle);
          } else if (char === "&") {
            const randomAngle = degToRad(
              randFloat(settings.minAngle, settings.maxAngle),
            );
            direction.applyAxisAngle(new THREE.Vector3(1, 0, 0), randomAngle);
          } else if (char === "^") {
            const randomAngle = degToRad(
              randFloat(settings.minAngle, settings.maxAngle),
            );
            direction.applyAxisAngle(new THREE.Vector3(1, 0, 0), -randomAngle);
          } else if (char === "[") {
            stateStack.push({
              position: position.clone(),
              direction: direction.clone(),
              currentProgress: currentProgress,
            });
          } else if (char === "]") {
            const state = stateStack.pop();
            position.copy(state.position);
            direction.copy(state.direction);
            currentProgress = state.currentProgress;
          }
        }

        const mergedGeometry = BufferGeometryUtils.mergeGeometries(
          geometries,
          true,
        );
        return new THREE.Mesh(mergedGeometry, flowingLightMaterial);
      }

      // Animation loop & event handling
      const clock = new THREE.Clock();

      function animate() {
        requestAnimationFrame(animate);

        const elapsedTime = clock.getElapsedTime();

        flowingLightMaterial.uniforms.uTime.value = elapsedTime;
        flowingLightMaterial.uniforms.uFlowSpeed.value = settings.flow
          ? settings.flowSpeed
          : 0.0;

        if (treeMesh) {
          treeMesh.rotation.x = Math.sin(elapsedTime) / 3;
          treeMesh.rotation.z = Math.cos(elapsedTime * 0.5) / -3;
          treeMesh.rotation.y = elapsedTime * 0.2;
        }

        controls.update();
        renderer.render(scene, camera);
      }

      window.addEventListener("resize", () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });

      const latestColors = [];
      renderer.domElement.addEventListener("click", () => {
        const currentColor = settings.lightColor;
        latestColors.push(settings.lightColor);
        if (latestColors.length > 5) {
          latestColors.shift();
        }
        settings.lightColor = randomFrom(colors, latestColors);
        flowingLightMaterial.uniforms.uLightColor.value = new THREE.Color(
          settings.lightColor,
        );
        scene.remove(treeMesh);
        treeMesh.geometry.dispose();
        treeMesh = generateLSystemTree(settings.axiom);
        scene.add(treeMesh);
      });

      // Init
      let treeMesh = generateLSystemTree(settings.axiom);
      scene.add(treeMesh);
      animate();
    </script>
  </body>
</html>
