<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Quantum Lotus Geometry</title>
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.174.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.174.0/examples/jsm/"
        }
      }
    </script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;700&family=Space+Mono&display=swap");

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: #030305;
        background:
          radial-gradient(
            circle at 50% 46%,
            rgba(255, 215, 0, 0.08) 0%,
            rgba(255, 215, 0, 0.02) 11%,
            transparent 28%
          ),
          radial-gradient(
            circle at 35% 28%,
            rgba(0, 255, 157, 0.12) 0%,
            rgba(0, 255, 157, 0.04) 26%,
            transparent 48%
          ),
          radial-gradient(
            circle at 70% 66%,
            rgba(138, 44, 255, 0.15) 0%,
            rgba(138, 44, 255, 0.04) 24%,
            transparent 48%
          ),
          radial-gradient(
            circle at center,
            #0d1022 0%,
            #05050a 52%,
            #010103 100%
          );
        font-family: "Rajdhani", sans-serif;
        color: #fff;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background:
          linear-gradient(
            115deg,
            transparent 0%,
            rgba(0, 255, 157, 0.03) 28%,
            transparent 46%,
            rgba(138, 44, 255, 0.03) 63%,
            transparent 100%
          ),
          repeating-linear-gradient(
            0deg,
            rgba(255, 255, 255, 0.015) 0px,
            rgba(255, 255, 255, 0.015) 1px,
            transparent 1px,
            transparent 4px
          );
        mix-blend-mode: screen;
        opacity: 0.8;
        z-index: 2;
      }

      body::after {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background: radial-gradient(
          circle at center,
          transparent 0%,
          transparent 48%,
          rgba(0, 0, 0, 0.6) 100%
        );
        z-index: 3;
      }

      #app {
        position: absolute;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: 1;
      }

      .ui-layer {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 10;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding: 30px;
        box-sizing: border-box;
      }

      .header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        text-transform: uppercase;
        letter-spacing: 0.2em;
      }

      .title-box h1 {
        margin: 0;
        font-size: 1.2rem;
        font-weight: 700;
        color: #00ff9d;
        text-shadow:
          0 0 10px rgba(0, 255, 157, 0.5),
          0 0 30px rgba(0, 255, 157, 0.22);
      }

      .title-box p {
        margin: 5px 0 0 0;
        font-size: 0.75rem;
        color: #ffd700;
        font-family: "Space Mono", monospace;
        text-shadow: 0 0 12px rgba(255, 215, 0, 0.35);
      }

      .status {
        font-family: "Space Mono", monospace;
        font-size: 0.7rem;
        color: rgba(255, 255, 255, 0.65);
        text-align: right;
        padding: 12px 14px;
        border: 1px solid rgba(0, 255, 157, 0.15);
        border-radius: 14px;
        background: rgba(0, 0, 0, 0.25);
        box-shadow:
          inset 0 0 24px rgba(0, 255, 157, 0.05),
          0 0 30px rgba(0, 0, 0, 0.3);
        backdrop-filter: blur(8px);
      }

      .footer {
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
      }

      .hint {
        color: rgba(0, 255, 157, 0.8);
        font-size: 0.75rem;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        display: flex;
        align-items: center;
        gap: 10px;
        text-shadow: 0 0 12px rgba(0, 255, 157, 0.3);
      }

      .hint::before {
        content: "";
        display: inline-block;
        width: 30px;
        height: 1px;
        background: linear-gradient(
          90deg,
          rgba(0, 255, 157, 0.2),
          rgba(255, 215, 0, 0.9)
        );
        box-shadow: 0 0 12px rgba(255, 215, 0, 0.5);
      }

      .frame-corners {
        position: absolute;
        top: 20px;
        left: 20px;
        right: 20px;
        bottom: 20px;
        border: 1px solid rgba(255, 255, 255, 0.04);
        pointer-events: none;
        box-shadow: inset 0 0 50px rgba(0, 255, 157, 0.02);
      }

      .frame-corners::before,
      .frame-corners::after {
        content: "";
        position: absolute;
        width: 18px;
        height: 18px;
        border-color: rgba(255, 215, 0, 0.7);
        border-style: solid;
        filter: drop-shadow(0 0 8px rgba(255, 215, 0, 0.4));
      }

      .frame-corners::before {
        top: -1px;
        left: -1px;
        border-width: 2px 0 0 2px;
      }
      .frame-corners::after {
        bottom: -1px;
        right: -1px;
        border-width: 0 2px 2px 0;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>

    <div class="ui-layer">
      <div class="frame-corners"></div>
      <div class="header">
        <div class="title-box">
          <h1>Interactive Lotus</h1>
          <p>Quantum Geometry</p>
        </div>
        <div class="status">
          SYS.ONLINE<br />
          FREQ: <span id="freq-val">432.0</span>HZ<br />
          CORE: <span style="color: #ffd700">STABLE</span><br />
          STB: <span style="color: #00ff9d">99.9%</span>
        </div>
      </div>
      <div class="footer">
        <div class="hint">Initialize Interaction [Drag/Zoom]</div>
        <svg
          width="40"
          height="40"
          viewBox="0 0 40 40"
          style="
            opacity: 0.7;
            filter: drop-shadow(0 0 8px rgba(255, 215, 0, 0.4));
          "
        >
          <circle
            cx="20"
            cy="20"
            r="18"
            fill="none"
            stroke="#00ff9d"
            stroke-width="1"
            stroke-dasharray="2 4"
          />
          <circle
            cx="20"
            cy="20"
            r="10"
            fill="none"
            stroke="#ffd700"
            stroke-width="1"
          />
          <circle cx="20" cy="20" r="2" fill="#fff" />
        </svg>
      </div>
    </div>

    <script type="module">
      import * as THREE from "three";
      import { OrbitControls } from "three/addons/controls/OrbitControls.js";
      import { EffectComposer } from "three/addons/postprocessing/EffectComposer.js";
      import { RenderPass } from "three/addons/postprocessing/RenderPass.js";
      import { UnrealBloomPass } from "three/addons/postprocessing/UnrealBloomPass.js";
      import { OutputPass } from "three/addons/postprocessing/OutputPass.js";

      const app = document.querySelector("#app");
      const clock = new THREE.Clock();

      const renderer = new THREE.WebGLRenderer({
        antialias: true,
        alpha: true,
        powerPreference: "high-performance",
      });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setClearColor(0x000000, 0);
      renderer.outputColorSpace = THREE.SRGBColorSpace;
      renderer.toneMapping = THREE.ACESFilmicToneMapping;
      renderer.toneMappingExposure = 0.95;
      app.appendChild(renderer.domElement);

      const scene = new THREE.Scene();
      scene.fog = new THREE.FogExp2(0x020204, 0.02);

      const camera = new THREE.PerspectiveCamera(
        45,
        window.innerWidth / window.innerHeight,
        0.1,
        100,
      );
      camera.position.set(2.2, 1.8, 8.6);

      const controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.dampingFactor = 0.05;
      controls.rotateSpeed = 0.6;
      controls.minDistance = 4;
      controls.maxDistance = 20;
      controls.autoRotate = true;
      controls.autoRotateSpeed = 0.4;
      controls.target.set(0, 0, 0);

      const composer = new EffectComposer(renderer);
      const renderPass = new RenderPass(scene, camera);
      const bloomPass = new UnrealBloomPass(
        new THREE.Vector2(window.innerWidth, window.innerHeight),
        0.35,
        0.75,
        0.15,
      );
      const outputPass = new OutputPass();
      composer.addPass(renderPass);
      composer.addPass(bloomPass);
      composer.addPass(outputPass);

      const colors = {
        emerald: new THREE.Color(0x00ff9d),
        violet: new THREE.Color(0x8a2cff),
        gold: new THREE.Color(0xffd700),
        coral: new THREE.Color(0xff7f50),
        rose: new THREE.Color(0xff007f),
        hotWhite: new THREE.Color(0xffffff),
        darkBlue: new THREE.Color(0x001133),
      };

      const sharedUniforms = {
        uTime: { value: 0 },
        uFlicker: { value: 1 },
      };

      const masterGroup = new THREE.Group();
      const outerConstruct = new THREE.Group();
      const lotusCore = new THREE.Group();
      masterGroup.add(outerConstruct);
      masterGroup.add(lotusCore);
      scene.add(masterGroup);

      const energyTubeMaterial = new THREE.ShaderMaterial({
        transparent: true,
        depthWrite: false,
        blending: THREE.AdditiveBlending,
        uniforms: {
          uTime: sharedUniforms.uTime,
          uColorA: { value: colors.violet },
          uColorB: { value: colors.emerald },
          uFlicker: sharedUniforms.uFlicker,
        },
        vertexShader: `
          varying vec2 vUv;
          varying vec3 vNormal;
          varying vec3 vViewPosition;
          void main() {
            vUv = uv;
            vNormal = normalize(normalMatrix * normal);
            vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
            vViewPosition = -mvPosition.xyz;
            gl_Position = projectionMatrix * mvPosition;
          }
        `,
        fragmentShader: `
          uniform float uTime;
          uniform float uFlicker;
          uniform vec3 uColorA;
          uniform vec3 uColorB;
          varying vec2 vUv;
          varying vec3 vNormal;
          varying vec3 vViewPosition;

          void main() {
            vec3 viewDir = normalize(vViewPosition);
            float fresnel = pow(max(0.0, 1.0 - abs(dot(viewDir, normalize(vNormal)))), 2.35);
            float traveling = smoothstep(0.7, 1.0, sin(vUv.y * 10.0 - uTime * 4.0) * 0.5 + 0.5);
            float filament = 0.5 + 0.5 * sin((vUv.y * 30.0) - uTime * 8.0);
            float pulse = uFlicker;
            float alpha = 0.25 + fresnel * 0.6 + traveling * 0.7 + filament * pulse * 0.3;
            vec3 baseColor = mix(uColorA, uColorB, vUv.y + sin(uTime) * 0.2);
            vec3 brightColor = mix(baseColor, vec3(1.0), traveling * 0.8);
            gl_FragColor = vec4(brightColor * 1.6, alpha);
          }
        `,
      });

      const lotusMaterial = new THREE.ShaderMaterial({
        transparent: true,
        depthWrite: false,
        side: THREE.DoubleSide,
        blending: THREE.AdditiveBlending,
        uniforms: {
          uTime: sharedUniforms.uTime,
          uColorA: { value: colors.coral },
          uColorB: { value: colors.gold },
          uPulse: sharedUniforms.uFlicker,
        },
        vertexShader: `
          varying vec2 vUv;
          varying vec3 vNormal;
          varying vec3 vWorld;
          varying vec3 vViewPosition;
          void main() {
            vUv = uv;
            vNormal = normalize(normalMatrix * normal);
            vec4 world = modelMatrix * vec4(position, 1.0);
            vWorld = world.xyz;
            vec4 mvPosition = viewMatrix * world;
            vViewPosition = -mvPosition.xyz;
            gl_Position = projectionMatrix * mvPosition;
          }
        `,
        fragmentShader: `
          uniform float uTime;
          uniform float uPulse;
          uniform vec3 uColorA;
          uniform vec3 uColorB;
          varying vec2 vUv;
          varying vec3 vNormal;
          varying vec3 vWorld;
          varying vec3 vViewPosition;

          void main() {
            vec3 viewDir = normalize(vViewPosition);
            float fresnel = pow(max(0.0, 1.0 - abs(dot(viewDir, normalize(vNormal)))), 1.8);
            float gradient = smoothstep(0.0, 1.0, vUv.y);
            float energy = sin(vUv.y * 20.0 - uTime * 3.0) * 0.5 + 0.5;
            energy = smoothstep(0.85, 1.0, energy) * 0.5;
            vec3 color = mix(uColorA, uColorB, gradient + fresnel * 0.3);
            color += energy * uPulse;
            float alpha = (fresnel * 0.4) + (gradient * 0.6) + energy;
            gl_FragColor = vec4(color, alpha * 0.8 * uPulse);
          }
        `,
      });

      const dodecRadius = 2.8;
      const dodecGeo = new THREE.DodecahedronGeometry(dodecRadius, 0);
      const posAttribute = dodecGeo.attributes.position;

      const uniqueVertices = [];
      for (let i = 0; i < posAttribute.count; i++) {
        const v = new THREE.Vector3(
          posAttribute.getX(i),
          posAttribute.getY(i),
          posAttribute.getZ(i),
        );
        let isDuplicate = false;
        for (let j = 0; j < uniqueVertices.length; j++) {
          if (v.distanceTo(uniqueVertices[j]) < 0.1) {
            isDuplicate = true;
            break;
          }
        }
        if (!isDuplicate) uniqueVertices.push(v);
      }

      const outerEdges = [];
      let minDistance = Infinity;
      for (let i = 0; i < uniqueVertices.length; i++) {
        for (let j = i + 1; j < uniqueVertices.length; j++) {
          let d = uniqueVertices[i].distanceTo(uniqueVertices[j]);
          if (d < minDistance) minDistance = d;
        }
      }

      for (let i = 0; i < uniqueVertices.length; i++) {
        for (let j = i + 1; j < uniqueVertices.length; j++) {
          if (
            uniqueVertices[i].distanceTo(uniqueVertices[j]) <
            minDistance + 0.1
          ) {
            outerEdges.push([uniqueVertices[i], uniqueVertices[j]]);
          }
        }
      }

      function makeTubeBetween(a, b, radius, mat) {
        const dir = new THREE.Vector3().subVectors(b, a);
        const len = dir.length();
        const mid = new THREE.Vector3().addVectors(a, b).multiplyScalar(0.5);
        const geometry = new THREE.CylinderGeometry(
          radius,
          radius,
          len,
          10,
          1,
          true,
        );
        geometry.rotateX(Math.PI * 0.5);
        const mesh = new THREE.Mesh(geometry, mat);
        mesh.position.copy(mid);
        mesh.quaternion.setFromUnitVectors(
          new THREE.Vector3(0, 0, 1),
          dir.normalize(),
        );
        return mesh;
      }

      function makeGlowNode(position, color, scale = 1) {
        const hdrColor = new THREE.Color(color).multiplyScalar(2.0);
        const coreMat = new THREE.MeshBasicMaterial({
          color: hdrColor,
          transparent: true,
          opacity: 1.0,
          blending: THREE.AdditiveBlending,
        });
        const mesh = new THREE.Mesh(
          new THREE.SphereGeometry(0.06 * scale, 16, 16),
          coreMat,
        );
        const glowMat = new THREE.MeshBasicMaterial({
          color,
          transparent: true,
          opacity: 0.65,
          blending: THREE.AdditiveBlending,
          depthWrite: false,
        });
        const glow = new THREE.Mesh(
          new THREE.SphereGeometry(0.24 * scale, 16, 16),
          glowMat,
        );
        const group = new THREE.Group();
        group.add(mesh);
        group.add(glow);
        group.position.copy(position);
        group.userData = {
          phase: Math.random() * Math.PI * 2,
          baseScale: scale,
        };
        return group;
      }

      const animatedElements = { nodes: [], travelers: [], lotusLayers: [] };

      outerEdges.forEach(([a, b]) => {
        const tubeMat = energyTubeMaterial.clone();
        tubeMat.uniforms.uColorA.value = new THREE.Color(
          colors.violet,
        ).multiplyScalar(1.5);
        tubeMat.uniforms.uColorB.value = new THREE.Color(
          colors.emerald,
        ).multiplyScalar(1.5);
        const t = makeTubeBetween(a, b, 0.015, tubeMat);
        outerConstruct.add(t);
      });

      uniqueVertices.forEach((p) => {
        const n = makeGlowNode(p, colors.emerald, 1.0);
        outerConstruct.add(n);
        animatedElements.nodes.push(n);
      });

      const petalGeo = new THREE.SphereGeometry(1, 32, 16);
      petalGeo.translate(0, 1, 0);

      function createLotusLayer(
        petalCount,
        radiusScale,
        zScale,
        openAngle,
        colA,
        colB,
      ) {
        const layerGroup = new THREE.Group();
        const mat = lotusMaterial.clone();
        mat.uniforms.uColorA.value = colA;
        mat.uniforms.uColorB.value = colB;

        for (let i = 0; i < petalCount; i++) {
          const angle = (i / petalCount) * Math.PI * 2;
          const petal = new THREE.Mesh(petalGeo, mat);
          petal.scale.set(0.4 * radiusScale, 1.4 * radiusScale, zScale);
          const pivot = new THREE.Group();
          pivot.add(petal);
          pivot.rotation.x = openAngle;
          const spinner = new THREE.Group();
          spinner.add(pivot);
          spinner.rotation.y = angle;
          layerGroup.add(spinner);
        }
        return layerGroup;
      }

      const layer1 = createLotusLayer(
        10,
        1.0,
        0.05,
        1.1,
        colors.violet,
        colors.rose,
      );
      const layer2 = createLotusLayer(
        8,
        0.75,
        0.06,
        0.7,
        colors.rose,
        colors.gold,
      );
      const layer3 = createLotusLayer(
        6,
        0.5,
        0.08,
        0.3,
        colors.gold,
        colors.hotWhite,
      );

      layer2.rotation.y = Math.PI / 8;
      layer3.rotation.y = Math.PI / 4;

      lotusCore.add(layer1, layer2, layer3);
      animatedElements.lotusLayers.push(
        { group: layer1, speed: 0.2, pulseBase: 1.1 },
        { group: layer2, speed: -0.3, pulseBase: 0.7 },
        { group: layer3, speed: 0.5, pulseBase: 0.3 },
      );

      const coreLight = new THREE.PointLight(colors.gold, 2.5, 10, 2);
      coreLight.position.y = 0.85;
      lotusCore.add(coreLight);

      function createTraveler() {
        const group = new THREE.Group();
        const coreMat = new THREE.MeshBasicMaterial({
          color: colors.hotWhite,
          transparent: true,
          opacity: 0.9,
          blending: THREE.AdditiveBlending,
        });
        const core = new THREE.Mesh(
          new THREE.OctahedronGeometry(0.04, 0),
          coreMat,
        );
        const wireMat = new THREE.LineBasicMaterial({
          color: colors.emerald,
          transparent: true,
          opacity: 0.7,
          blending: THREE.AdditiveBlending,
        });
        const wire = new THREE.LineSegments(
          new THREE.WireframeGeometry(new THREE.OctahedronGeometry(0.12, 0)),
          wireMat,
        );
        group.add(core);
        group.add(wire);
        return { mesh: group, wire: wire };
      }

      outerEdges.forEach((edge, i) => {
        if (i % 2 !== 0) return;
        const travelerData = createTraveler();
        outerConstruct.add(travelerData.mesh);
        animatedElements.travelers.push({
          ...travelerData,
          a: edge[0],
          b: edge[1],
          speed: 0.2 + Math.random() * 0.4,
          offset: Math.random() * Math.PI * 2,
          direction: Math.random() > 0.5 ? 1 : -1,
        });
      });

      const ambientLight = new THREE.AmbientLight(0x050510, 2.0);
      scene.add(ambientLight);

      const fillLight = new THREE.PointLight(colors.violet, 1.5, 15, 2);
      fillLight.position.set(-4, 3, 4);
      scene.add(fillLight);

      const particleCount = 1200;
      const particleGeo = new THREE.BufferGeometry();
      const particlePos = new Float32Array(particleCount * 3);
      const particleScales = new Float32Array(particleCount);
      const particleColorMix = new Float32Array(particleCount);

      for (let i = 0; i < particleCount; i++) {
        const r = 0.5 + Math.pow(Math.random(), 2.0) * 5.0;
        const theta = Math.random() * Math.PI * 2;
        const y = (Math.random() - 0.5) * 3.0;
        particlePos[i * 3] = Math.cos(theta) * r;
        particlePos[i * 3 + 1] = y;
        particlePos[i * 3 + 2] = Math.sin(theta) * r;
        particleScales[i] = Math.random();
        particleColorMix[i] = Math.random();
      }

      particleGeo.setAttribute(
        "position",
        new THREE.BufferAttribute(particlePos, 3),
      );
      particleGeo.setAttribute(
        "aScale",
        new THREE.BufferAttribute(particleScales, 1),
      );
      particleGeo.setAttribute(
        "aColorMix",
        new THREE.BufferAttribute(particleColorMix, 1),
      );

      const particleMat = new THREE.ShaderMaterial({
        transparent: true,
        depthWrite: false,
        blending: THREE.AdditiveBlending,
        uniforms: {
          uTime: sharedUniforms.uTime,
          uColorA: { value: colors.emerald },
          uColorB: { value: colors.gold },
          uColorC: { value: colors.violet },
        },
        vertexShader: `
          uniform float uTime;
          attribute float aScale;
          attribute float aColorMix;
          varying float vAlpha;
          varying float vColorMix;

          void main() {
            float distXZ = max(length(position.xz), 0.001);
            float angle = uTime * (0.3 / distXZ);
            mat2 rot = mat2(cos(angle), -sin(angle), sin(angle), cos(angle));
            vec3 pos = position;
            pos.xz = rot * pos.xz;
            pos.y += sin(uTime * 1.2 + distXZ * 3.0 + aScale * 8.0) * 0.05;
            vec4 mvPosition = modelViewMatrix * vec4(pos, 1.0);
            gl_PointSize = (12.0 * aScale + 2.0) * (1.0 / -mvPosition.z);
            vAlpha = (0.2 + 0.6 * sin(uTime * 2.0 + aScale * 10.0)) * (1.0 - smoothstep(0.0, 6.0, length(pos)));
            vColorMix = aColorMix;
            gl_Position = projectionMatrix * mvPosition;
          }
        `,
        fragmentShader: `
          uniform vec3 uColorA;
          uniform vec3 uColorB;
          uniform vec3 uColorC;
          varying float vAlpha;
          varying float vColorMix;

          void main() {
            float dist = length(gl_PointCoord - vec2(0.5));
            if (dist > 0.5) discard;
            float glow = smoothstep(0.5, 0.0, dist);
            vec3 color = mix(uColorA, uColorB, smoothstep(0.2, 0.8, vColorMix));
            color = mix(color, uColorC, smoothstep(0.7, 1.0, vColorMix) * 0.5);
            gl_FragColor = vec4(color * glow, vAlpha * glow);
          }
        `,
      });

      const stardust = new THREE.Points(particleGeo, particleMat);
      scene.add(stardust);

      function setViewportSize() {
        const width = window.innerWidth;
        const height = window.innerHeight;
        renderer.setSize(width, height);
        composer.setSize(width, height);
        camera.aspect = width / height;
        camera.updateProjectionMatrix();
      }
      window.addEventListener("resize", setViewportSize);
      setViewportSize();

      const freqUi = document.getElementById("freq-val");

      function animate() {
        const time = clock.getElapsedTime();
        sharedUniforms.uTime.value = time;

        const surge = Math.pow(Math.sin(time * 1.8) * 0.5 + 0.5, 3.0);
        sharedUniforms.uFlicker.value = 0.8 + surge * 0.6;

        if (Math.floor(time * 10) % 6 === 0) {
          freqUi.innerText = (
            432.0 +
            (Math.random() * 1.5 - 0.75) +
            surge * 5
          ).toFixed(1);
        }

        masterGroup.position.y = Math.sin(time * 0.6) * 0.12;

        outerConstruct.rotation.y = time * 0.15;
        outerConstruct.rotation.x = Math.sin(time * 0.1) * 0.08;
        outerConstruct.rotation.z = Math.cos(time * 0.08) * 0.05;

        lotusCore.rotation.y = -time * 0.2;
        lotusCore.position.y = -1.25;

        animatedElements.lotusLayers.forEach((layer, idx) => {
          layer.group.rotation.y += layer.speed * 0.01;
          const flex = Math.sin(time * 1.5 + idx) * 0.1 + surge * 0.05;
          layer.group.children.forEach((spinner) => {
            const pivot = spinner.children[0];
            pivot.rotation.x = layer.pulseBase + flex;
          });
        });

        animatedElements.nodes.forEach((node) => {
          const s =
            node.userData.baseScale *
            (1.0 +
              0.1 * Math.sin(time * 4.0 + node.userData.phase) +
              surge * 0.2);
          node.scale.setScalar(s);
        });

        animatedElements.travelers.forEach((orb) => {
          const raw = (time * orb.speed + orb.offset) % 2.0;
          const t = raw > 1.0 ? 2.0 - raw : raw;
          const pos = new THREE.Vector3().lerpVectors(
            orb.a,
            orb.b,
            orb.direction === 1 ? t : 1.0 - t,
          );
          orb.mesh.position.copy(pos);
          orb.wire.rotation.x = time * 2.0;
          orb.wire.rotation.y = time * 3.0;
          const flare = Math.sin(time * 8.0 + orb.offset) * 0.5 + 0.5;
          orb.mesh.scale.setScalar(1.0 + flare * 0.3 + surge * 0.2);
        });

        stardust.rotation.y = time * 0.03;

        controls.update();
        composer.render();
        requestAnimationFrame(animate);
      }

      animate();
    </script>
  </body>
</html>
