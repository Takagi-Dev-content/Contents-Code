<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PS2 Orbs</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: black;
      }

      #canvas-container {
        width: 100%;
        height: 100%;
      }
    </style>
  </head>
  <body>
    <div id="canvas-container"></div>

    <script type="module">
      import * as THREE from "https://esm.sh/three@0.184.0";

      class WebGLOrbs {
        constructor() {
          this.container = document.getElementById("canvas-container");

          this.scene = new THREE.Scene();
          this.camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);

          this.renderer = new THREE.WebGLRenderer({
            alpha: true,
            antialias: false,
            powerPreference: "high-performance",
          });

          this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

          this.container.appendChild(this.renderer.domElement);

          this.width = window.innerWidth;
          this.height = window.innerHeight;

          this.renderer.setSize(this.width, this.height);

          this.setupRenderTargets();
          this.setupShaders();

          this.geometry = new THREE.PlaneGeometry(2, 2);
          this.mesh = new THREE.Mesh(this.geometry, this.materialA);

          this.scene.add(this.mesh);

          this.clock = new THREE.Clock();
          this.isActive = true;

          window.addEventListener("resize", this.onWindowResize.bind(this));

          this.animate = this.animate.bind(this);
          requestAnimationFrame(this.animate);
        }

        setupRenderTargets() {
          const options = {
            minFilter: THREE.LinearFilter,
            magFilter: THREE.LinearFilter,
            format: THREE.RGBAFormat,
            type: THREE.HalfFloatType,
          };

          this.rtA = new THREE.WebGLRenderTarget(
            this.width,
            this.height,
            options,
          );

          this.rtB1 = new THREE.WebGLRenderTarget(
            this.width,
            this.height,
            options,
          );

          this.rtB2 = new THREE.WebGLRenderTarget(
            this.width,
            this.height,
            options,
          );

          this.rtB_current = this.rtB1;
          this.rtB_next = this.rtB2;
        }

        getVertexShader() {
          return `
      varying vec2 vUv;

      void main() {
        vUv = uv;
        gl_Position = vec4(position, 1.0);
      }
    `;
        }

        getFragmentPrefix() {
          return `
      uniform vec3 iResolution;
      uniform float iTime;
      uniform sampler2D iChannel0;
      uniform sampler2D iChannel1;
      varying vec2 vUv;
    `;
        }

        getFragmentSuffix() {
          return `
      void main() {
        vec4 fragColor = vec4(0.0);
        vec2 fragCoord = vUv * iResolution.xy;
        mainImage(fragColor, fragCoord);
        gl_FragColor = fragColor;
      }
    `;
        }

        setupShaders() {
          const uniformsA = {
            iResolution: {
              value: new THREE.Vector3(this.width, this.height, 1),
            },
            iTime: { value: 0 },
            iOffsetX: { value: 0.0 },
          };

          const codeA = `
      uniform float iOffsetX;

      float pi = 3.14159265358979323;

      #define clamps(x) clamp(x,0.,1.)

      vec3 rX(vec3 p, float a){
        float c,s;
        vec3 q=p;
        c=cos(a);
        s=sin(a);
        p.y=c*q.y-s*q.z;
        p.z=s*q.y+c*q.z;
        return p;
      }

      vec3 rY(vec3 p,float a){
        float c,s;
        vec3 q=p;
        c=cos(a);
        s=sin(a);
        p.x=c*q.x+s*q.z;
        p.z=-s*q.x+c*q.z;
        return p;
      }

      vec3 rZ(vec3 p,float a){
        float c,s;
        vec3 q=p;
        c=cos(a);
        s=sin(a);
        p.x=c*q.x-s*q.y;
        p.y=s*q.x+c*q.y;
        return p;
      }

      vec2 dirDist(float dir,float dist){
        return vec2(cos(dir)*dist,sin(dir)*dist);
      }

      vec3 animation(vec2 uv,float time){
        float circles=0.;

        for(float k=0.;k<8.;k++){
          float DIRECTION=time*k*0.1;
          float DISTANCE=0.2;

          vec3 POSITION=
          vec3(dirDist(DIRECTION,DISTANCE),0.);

          POSITION=rY(POSITION,time*1.1);
          POSITION=rZ(POSITION,time*2.15);
          POSITION=rX(POSITION,time*0.52);

          circles=max(
            circles,
            clamps(
              1.-(length(uv-POSITION.xy)*40.)
            )
          );
        }

        circles=clamp(circles,0.,1.);

        return vec3(circles);
      }

      void mainImage(
        out vec4 fragColor,
        in vec2 fragCoord
      ){
        vec2 uv=fragCoord.xy/iResolution.xy;

        vec2 suv=uv-.5;
        suv.x/=iResolution.y/iResolution.x;
        suv.x-=iOffsetX;

        vec3 drawing=animation(suv,iTime);

        drawing=vec3(
          pow(drawing,vec3(2.5,1.8,1.))
        );

        fragColor=vec4(drawing,1.);
      }
    `;

          this.materialA = new THREE.ShaderMaterial({
            uniforms: uniformsA,
            vertexShader: this.getVertexShader(),
            fragmentShader:
              this.getFragmentPrefix() + codeA + this.getFragmentSuffix(),
            depthWrite: false,
            depthTest: false,
          });

          const uniformsB = {
            iResolution: {
              value: new THREE.Vector3(this.width, this.height, 1),
            },
            iTime: { value: 0 },
            iChannel0: { value: null },
            iChannel1: { value: this.rtA.texture },
          };

          const codeB = `
      #define clamps(x) clamp(x,0.,1.)

      float pi=3.14159265358979323;

      vec2 circle(float a){
        return vec2(cos(a),sin(a));
      }

      void mainImage(
        out vec4 fragColor,
        in vec2 fragCoord
      ){
        vec2 uv=fragCoord.xy/iResolution.xy;

        vec4 d=vec4(0);

        #define L 8.

        for(float i=0.;i<L;i++){
          vec2 p=circle((i/L)*pi*2.);
          p.x/=iResolution.x/iResolution.y;

          d=max(
            d,
            texture2D(
              iChannel1,
              uv+(p*0.00015)
            )
          );
        }

        fragColor=
          (texture2D(iChannel0,uv)*0.85)
          +(clamps(d)*0.5);
      }
    `;

          this.materialB = new THREE.ShaderMaterial({
            uniforms: uniformsB,
            vertexShader: this.getVertexShader(),
            fragmentShader:
              this.getFragmentPrefix() + codeB + this.getFragmentSuffix(),
            depthWrite: false,
            depthTest: false,
          });

          const uniformsImage = {
            iResolution: {
              value: new THREE.Vector3(this.width, this.height, 1),
            },
            iTime: { value: 0 },
            iChannel0: { value: null },
            iChannel1: { value: this.rtA.texture },
          };

          const codeImage = `
      #define clamps(x) clamp(x,0.,1.)

      void mainImage(
        out vec4 fragColor,
        in vec2 fragCoord
      ){
        vec2 uv=fragCoord.xy/iResolution.xy;

        vec4 base=
          texture2D(iChannel0,uv)
          + texture2D(iChannel1,uv);

        float alpha=
          clamps(length(base.xyz)*2.0);

        fragColor=
          vec4(base.xyz,alpha);
      }
    `;

          this.materialImage = new THREE.ShaderMaterial({
            uniforms: uniformsImage,
            vertexShader: this.getVertexShader(),
            fragmentShader:
              this.getFragmentPrefix() + codeImage + this.getFragmentSuffix(),
            transparent: true,
            blending: THREE.AdditiveBlending,
            depthWrite: false,
            depthTest: false,
          });
        }

        onWindowResize() {
          this.width = window.innerWidth;
          this.height = window.innerHeight;

          this.renderer.setSize(this.width, this.height);

          this.rtA.setSize(this.width, this.height);

          this.rtB1.setSize(this.width, this.height);

          this.rtB2.setSize(this.width, this.height);

          this.materialA.uniforms.iResolution.value.set(
            this.width,
            this.height,
            1,
          );

          this.materialB.uniforms.iResolution.value.set(
            this.width,
            this.height,
            1,
          );

          this.materialImage.uniforms.iResolution.value.set(
            this.width,
            this.height,
            1,
          );
        }

        animate() {
          requestAnimationFrame(this.animate);

          if (!this.isActive) return;

          const time = this.clock.getElapsedTime();

          this.materialA.uniforms.iTime.value = time;
          this.mesh.material = this.materialA;

          this.renderer.setRenderTarget(this.rtA);
          this.renderer.render(this.scene, this.camera);

          this.materialB.uniforms.iTime.value = time;
          this.materialB.uniforms.iChannel0.value = this.rtB_current.texture;

          this.mesh.material = this.materialB;

          this.renderer.setRenderTarget(this.rtB_next);

          this.renderer.render(this.scene, this.camera);

          const temp = this.rtB_current;
          this.rtB_current = this.rtB_next;
          this.rtB_next = temp;

          this.materialImage.uniforms.iTime.value = time;

          this.materialImage.uniforms.iChannel0.value =
            this.rtB_current.texture;

          this.mesh.material = this.materialImage;

          this.renderer.setRenderTarget(null);
          this.renderer.clear();

          this.materialA.uniforms.iOffsetX.value = 0.0;

          this.renderer.render(this.scene, this.camera);
        }
      }

      new WebGLOrbs();
    </script>
  </body>
</html>
