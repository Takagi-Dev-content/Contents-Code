      body {
        overflow: hidden;
        margin: 0;
        height: 100vh;
        perspective: 35em;
        background: #000;
      }

      div {
        position: absolute;
        transform-style: preserve-3d;
      }

      @keyframes rot {
        to {
          transform: var(--ini) rotatex(1turn) rotate(1turn);
        }
      }
      .assembly {
        top: 50%;
        left: 50%;
      }
      .dot {
        --ay: calc((var(--i)/var(--n-rings) + var(--j)/var(--n-dots)) * 1turn);
        transform: rotatey(var(--ay)) translate(var(--r-ring))
          rotatey(calc(-1 * var(--ay)));
      }
      .ring {
        --sf: calc((var(--i) + 1) / var(--n-rings));
        --r-ring: calc(var(--f) * 15px);
        --ini: scale3d(var(--sf), var(--sf), var(--sf));
        transform: var(--ini);
        animation: var(--ani);
        --ani: rot 12s ease-in-out calc(var(--i)/var(--n-rings) * -6s) infinite;
      }

      .dot:before {
        position: absolute;
        margin: -3px;
        padding: 3px;
        border-radius: 50%;
        background: HSL(calc(var(--j) / var(--n-dots) * 360), 75%, 75%);
        animation: var(--ani);
        animation-name: rev;
        content: "";
      }

      @keyframes rev {
        to {
          transform: rotate(-1turn) rotatex(-1turn);
        }
      }
